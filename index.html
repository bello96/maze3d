<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D迷宫</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>">

    <script src="Box2dWeb.min.js"></script>
    <script src="maze.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>

        var camera, scene, renderer, light, ballLight;
        var maze, mazeMesh, planeMesh, ballMesh;
        var mazeDimension  = 11;
        var ballRadius     = 0.25;
        var gameState;
        var ballQuaternion = new THREE.Quaternion();
        var keysPressed    = new Set();
        var currentLevel   = 1;
        var startX = 1, startY = 1;
        var exitX, exitY;

        // Delta time for frame-rate independent physics
        var lastFrameTime = 0;
        var physicsAccumulator = 0;
        var PHYSICS_STEP = 1 / 60;

        // Loading
        var texturesReady = false;
        var domReady = false;

        var loadingManager = new THREE.LoadingManager();
        loadingManager.onProgress = function(url, loaded, total) {
            var bar = document.getElementById('loading-bar-fill');
            var text = document.getElementById('loading-text');
            var pct = Math.round(loaded / total * 100);
            if (bar) { bar.style.width = pct + '%'; }
            if (text) { text.textContent = '加载中... ' + pct + '%'; }
        };
        loadingManager.onLoad = function() {
            texturesReady = true;
            tryStartGame();
        };

        var textureLoader = new THREE.TextureLoader(loadingManager);

        var brickTexture = textureLoader.load('brick.png');
        brickTexture.colorSpace = THREE.SRGBColorSpace;

        var ironTexture = textureLoader.load('ball.png');
        ironTexture.colorSpace = THREE.SRGBColorSpace;

        var planeTexture = textureLoader.load('concrete.png');
        planeTexture.colorSpace = THREE.SRGBColorSpace;
        planeTexture.wrapS = planeTexture.wrapT = THREE.RepeatWrapping;

        // Box2D shortcuts
        var b2World        = Box2D.Dynamics.b2World,
            b2FixtureDef   = Box2D.Dynamics.b2FixtureDef,
            b2BodyDef      = Box2D.Dynamics.b2BodyDef,
            b2Body         = Box2D.Dynamics.b2Body,
            b2CircleShape  = Box2D.Collision.Shapes.b2CircleShape,
            b2PolygonShape = Box2D.Collision.Shapes.b2PolygonShape,
            b2Vec2         = Box2D.Common.Math.b2Vec2;

        var wWorld, wBall;


        function createPhysicsWorld() {
            wWorld = new b2World(new b2Vec2(0, 0), true);

            var bodyDef = new b2BodyDef();
            bodyDef.type = b2Body.b2_dynamicBody;
            bodyDef.position.Set(startX, startY);
            wBall = wWorld.CreateBody(bodyDef);

            var fixDef = new b2FixtureDef();
            fixDef.density = 1.0;
            fixDef.friction = 0.0;
            fixDef.restitution = 0.25;
            fixDef.shape = new b2CircleShape(ballRadius);
            wBall.CreateFixture(fixDef);

            bodyDef.type = b2Body.b2_staticBody;
            fixDef.shape = new b2PolygonShape();
            fixDef.shape.SetAsBox(0.5, 0.5);
            for (var i = 0; i < maze.dimension; i++) {
                for (var j = 0; j < maze.dimension; j++) {
                    if (maze[i][j]) {
                        bodyDef.position.x = i;
                        bodyDef.position.y = j;
                        wWorld.CreateBody(bodyDef).CreateFixture(fixDef);
                    }
                }
            }
        }


        function generateMazeMesh(field) {
            var count = 0;
            for (var i = 0; i < field.dimension; i++) {
                for (var j = 0; j < field.dimension; j++) {
                    if (field[i][j]) { count++; }
                }
            }
            var geo = new THREE.BoxGeometry(1, 1, 1);
            var mat = new THREE.MeshPhongMaterial({ map: brickTexture, color: 0xffffff });
            var mesh = new THREE.InstancedMesh(geo, mat, count);
            var matrix = new THREE.Matrix4();
            var idx = 0;
            for (var i = 0; i < field.dimension; i++) {
                for (var j = 0; j < field.dimension; j++) {
                    if (field[i][j]) {
                        matrix.setPosition(i, j, 0.5);
                        mesh.setMatrixAt(idx, matrix);
                        idx++;
                    }
                }
            }
            mesh.instanceMatrix.needsUpdate = true;
            return mesh;
        }


        function createRenderWorld() {
            scene = new THREE.Scene();

            // Dim ambient scene light
            light = new THREE.PointLight(0xffffff, 0.3, 0, 0);
            light.position.set(1, 1, 1.3);
            scene.add(light);

            // Warm local light following the ball
            ballLight = new THREE.PointLight(0xffeedd, 1.5, 10, 1);
            ballLight.position.set(1, 1, 2.5);
            scene.add(ballLight);

            // Ball
            var ballGeo = new THREE.SphereGeometry(ballRadius, 32, 16);
            var ballMat = new THREE.MeshPhongMaterial({
                map: ironTexture,
                color: 0xffffff,
                shininess: 30,
                specular: 0x222222
            });
            ballMesh = new THREE.Mesh(ballGeo, ballMat);
            ballMesh.position.set(startX, startY, ballRadius);
            ballQuaternion.identity();
            scene.add(ballMesh);

            // Camera
            var aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 1, 1000);
            camera.position.set(1, 1, 5);
            scene.add(camera);

            // Maze walls
            mazeMesh = generateMazeMesh(maze);
            scene.add(mazeMesh);

            // Ground
            planeTexture.repeat.set(mazeDimension * 5, mazeDimension * 5);
            var planeGeo = new THREE.PlaneGeometry(
                mazeDimension * 10, mazeDimension * 10,
                mazeDimension, mazeDimension
            );
            var planeMat = new THREE.MeshBasicMaterial({ map: planeTexture });
            planeMesh = new THREE.Mesh(planeGeo, planeMat);
            planeMesh.position.set((mazeDimension - 1) / 2, (mazeDimension - 1) / 2, 0);
            scene.add(planeMesh);
        }


        function updatePhysicsWorld() {
            var lv = wBall.GetLinearVelocity();
            lv.Multiply(0.95);
            wBall.SetLinearVelocity(lv);

            var axis = getKeyAxis();
            var mass = wBall.GetMass();
            var f = new b2Vec2(axis[0] * mass * 0.25, axis[1] * mass * 0.25);
            wBall.ApplyImpulse(f, wBall.GetPosition());

            wWorld.Step(1 / 60, 8, 3);
        }


        function updateRenderWorld() {
            var pos = wBall.GetPosition();
            var stepX = pos.x - ballMesh.position.x;
            var stepY = pos.y - ballMesh.position.y;
            ballMesh.position.x += stepX;
            ballMesh.position.y += stepY;

            var qY = new THREE.Quaternion().setFromAxisAngle(
                new THREE.Vector3(0, 1, 0), stepX / ballRadius
            );
            var qX = new THREE.Quaternion().setFromAxisAngle(
                new THREE.Vector3(1, 0, 0), -stepY / ballRadius
            );
            ballQuaternion.premultiply(qY).premultiply(qX);
            ballMesh.quaternion.copy(ballQuaternion);

            camera.position.x += (ballMesh.position.x - camera.position.x) * 0.1;
            camera.position.y += (ballMesh.position.y - camera.position.y) * 0.1;
            camera.position.z += (5 - camera.position.z) * 0.1;
            light.position.set(
                camera.position.x,
                camera.position.y,
                camera.position.z - 3.7
            );
            ballLight.position.set(
                ballMesh.position.x,
                ballMesh.position.y,
                2.5
            );
        }


        function getKeyAxis() {
            var x = 0, y = 0;
            if (keysPressed.has('arrowleft') || keysPressed.has('h'))  { x = -1; }
            if (keysPressed.has('arrowright') || keysPressed.has('l'))  { x =  1; }
            if (keysPressed.has('arrowdown') || keysPressed.has('j'))   { y = -1; }
            if (keysPressed.has('arrowup') || keysPressed.has('k'))     { y =  1; }
            return [x, y];
        }


        function showLevelOverlay() {
            var overlay = document.getElementById('level-overlay');
            var sizeInfo = mazeDimension + '\u00d7' + mazeDimension;
            overlay.innerHTML = '\u7b2c ' + currentLevel + ' \u5173<br><span class="level-sub">' + sizeInfo + ' \u8ff7\u5bab</span>';
            overlay.style.opacity = '1';
            setTimeout(function() {
                overlay.style.opacity = '0';
            }, 2000);
        }


        var LIGHT_MAX = 0.3;
        var BALL_LIGHT_MAX = 1.5;

        function gameLoop(timestamp) {
            if (lastFrameTime === 0) { lastFrameTime = timestamp; }
            var dt = Math.min((timestamp - lastFrameTime) / 1000, 0.1);
            lastFrameTime = timestamp;

            switch (gameState) {

                case 'initialize':
                    maze = generateSquareMaze(mazeDimension, 0.25);

                    startX = 1; startY = 1;

                    // Random exit on right or top edge
                    var exits = [];
                    for (var xi = 1; xi < mazeDimension - 1; xi += 2) {
                        if (!maze[mazeDimension - 2][xi]) {
                            exits.push({bx: mazeDimension - 1, by: xi, ex: mazeDimension, ey: xi});
                        }
                        if (!maze[xi][mazeDimension - 2]) {
                            exits.push({bx: xi, by: mazeDimension - 1, ex: xi, ey: mazeDimension});
                        }
                    }
                    if (exits.length > 0) {
                        var chosen = exits[Math.floor(Math.random() * exits.length)];
                        maze[chosen.bx][chosen.by] = false;
                        exitX = chosen.ex;
                        exitY = chosen.ey;
                    } else {
                        maze[mazeDimension - 1][mazeDimension - 2] = false;
                        exitX = mazeDimension;
                        exitY = mazeDimension - 2;
                    }

                    createPhysicsWorld();
                    createRenderWorld();
                    camera.position.set(startX, startY, 5);
                    light.position.set(startX, startY, 1.3);
                    light.intensity = 0;
                    ballLight.intensity = 0;
                    physicsAccumulator = 0;
                    showLevelOverlay();
                    gameState = 'fade in';
                    break;

                case 'fade in':
                    var fadeIn = 1 - Math.exp(-6 * dt);
                    light.intensity += (LIGHT_MAX - light.intensity) * fadeIn;
                    ballLight.intensity += (BALL_LIGHT_MAX - ballLight.intensity) * fadeIn;
                    renderer.render(scene, camera);
                    if (Math.abs(light.intensity - LIGHT_MAX) < 0.05) {
                        light.intensity = LIGHT_MAX;
                        ballLight.intensity = BALL_LIGHT_MAX;
                        gameState = 'play';
                    }
                    break;

                case 'play':
                    physicsAccumulator += dt;
                    while (physicsAccumulator >= PHYSICS_STEP) {
                        updatePhysicsWorld();
                        physicsAccumulator -= PHYSICS_STEP;
                    }
                    updateRenderWorld();
                    renderer.render(scene, camera);

                    if (Math.floor(ballMesh.position.x + 0.5) === exitX &&
                        Math.floor(ballMesh.position.y + 0.5) === exitY) {
                        mazeDimension += 2;
                        currentLevel++;
                        gameState = 'fade out';
                    }
                    break;

                case 'fade out':
                    physicsAccumulator += dt;
                    while (physicsAccumulator >= PHYSICS_STEP) {
                        updatePhysicsWorld();
                        physicsAccumulator -= PHYSICS_STEP;
                    }
                    updateRenderWorld();
                    var fadeOut = 1 - Math.exp(-6 * dt);
                    light.intensity += (0.0 - light.intensity) * fadeOut;
                    ballLight.intensity += (0.0 - ballLight.intensity) * fadeOut;
                    renderer.render(scene, camera);
                    if (Math.abs(light.intensity) < 0.1) {
                        light.intensity = 0.0;
                        ballLight.intensity = 0.0;
                        renderer.render(scene, camera);
                        gameState = 'initialize';
                    }
                    break;
            }

            requestAnimationFrame(gameLoop);
        }


        function tryStartGame() {
            if (!texturesReady || !domReady) { return; }
            var bar = document.getElementById('loading-bar-fill');
            if (bar) { bar.style.width = '100%'; }
            var overlay = document.getElementById('loading-overlay');
            overlay.style.opacity = '0';
            setTimeout(function() { overlay.style.display = 'none'; }, 600);
            gameState = 'initialize';
            requestAnimationFrame(gameLoop);
        }


        document.addEventListener('DOMContentLoaded', function() {

            document.addEventListener('keydown', function(e) {
                keysPressed.add(e.key.toLowerCase());
            });

            document.addEventListener('keyup', function(e) {
                keysPressed.delete(e.key.toLowerCase());
            });

            window.addEventListener('blur', function() { keysPressed.clear(); });

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', function() {
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (camera) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });

            domReady = true;
            tryStartGame();
        });

    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: black;
            font-family: 'Helvetica', sans-serif;
            overflow: hidden;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.6s ease-out;
        }

        #loading-content {
            text-align: center;
        }

        #loading-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        #loading-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 24px;
            letter-spacing: 4px;
        }

        #loading-bar {
            width: 240px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin: 0 auto 12px;
            overflow: hidden;
        }

        #loading-bar-fill {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        #loading-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        #level-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        .level-sub {
            font-size: 20px;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div id="loading-content">
            <div id="loading-icon">🧱</div>
            <div id="loading-title">3D迷宫</div>
            <div id="loading-bar"><div id="loading-bar-fill"></div></div>
            <div id="loading-text">加载中...</div>
        </div>
    </div>
    <div id="level-overlay"></div>
</body>

</html>
